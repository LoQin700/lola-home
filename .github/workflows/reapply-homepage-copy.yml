name: Reapply homepage copy

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/reapply-homepage-copy.yml

permissions:
  contents: write

jobs:
  update-homepage:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update homepage content
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path('templates/index.json')
          raw = path.read_text(encoding='utf-8')
          json_start = raw.find('{')
          prefix = raw[:json_start]
          data = json.loads(raw[json_start:])

          rich = data['sections']['section_QfwA36']
          rich['blocks']['text_YAAHKN']['settings'].update({
              'text': '<p>CONTACT US</p>',
              'width': '100%',
              'alignment': 'center'
          })
          rich['blocks']['text_P4MqyW']['settings'].update({
              'text': '<h2>Let’s Create Something Beautiful</h2>',
              'width': '100%',
              'alignment': 'center',
              'font_size': '2.5rem'
          })
          rich['blocks']['button_JgJTK4']['settings'].update({
              'label': 'GET IN TOUCH',
              'link': 'shopify://pages/contact-1'
          })
          rich['settings'].update({
              'horizontal_alignment': 'center',
              'gap': 24,
              'padding-block-start': 64,
              'padding-block-end': 64
          })

          icons = data['sections']['section_yHjGnA']['blocks']
          replacements = {
              'group_rNVJNY': ('truck', 'Efficient Custom Production', 'Quality custom furniture with a reliable production timeline.'),
              'group_Drr7mq': ('star', 'Expertly Made in China', 'Where precision craftsmanship meets tailored design.'),
              'group_8MHazd': ('plant', 'Premium Materials', 'Premium fabrics, solid wood, and lasting craftsmanship.'),
              'group_gUY8eF': ('chat_bubble', 'Free Designer Advice', 'See your sofa in your space with our free design service.')
          }

          for group_id, (icon_name, title, body) in replacements.items():
              group = icons[group_id]
              icon_block = next(block for block in group['blocks'].values() if block['type'] == 'icon')
              icon_block['settings']['icon'] = icon_name
              text_group = next(block for block in group['blocks'].values() if block['type'] == 'group')
              text_blocks = [block for block in text_group['blocks'].values() if block['type'] == 'text']
              text_blocks[0]['settings']['text'] = f'<h2>{title}</h2>'
              text_blocks[0]['settings']['alignment'] = 'center'
              text_blocks[1]['settings']['text'] = f'<p>{body}</p>'
              text_blocks[1]['settings']['alignment'] = 'center'

          path.write_text(prefix + json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Commit homepage update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add templates/index.json
          git diff --cached --quiet || git commit -m "Update homepage icon and contact copy"
          git push
