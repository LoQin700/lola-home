name: Update homepage copy

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-homepage-copy.yml

permissions:
  contents: write

jobs:
  update-homepage-copy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update homepage content
        shell: python
        run: |
          from pathlib import Path
          import json

          path = Path("templates/index.json")
          raw = path.read_text(encoding="utf-8")
          json_start = raw.find("{")
          header = raw[:json_start]
          data = json.loads(raw[json_start:])
          sections = data["sections"]

          icons = sections["section_yHjGnA"]["blocks"]

          first = icons["group_rNVJNY"]["blocks"]["group_j4JfCJ"]["blocks"]
          first["text_NzHT3r"]["settings"]["text"] = "<h2>Efficient Custom Production</h2>"
          first["text_fYGmQR"]["settings"]["text"] = "<p>Quality custom furniture with a reliable production timeline.</p>"

          second = icons["group_Drr7mq"]["blocks"]
          second["icon_cMJNUx"]["settings"]["icon"] = "star"
          second_text = second["group_3T9xYM"]["blocks"]
          second_text["text_RFpHc8"]["settings"]["text"] = "<h2>Expertly Made in China</h2>"
          second_text["text_z739z4"]["settings"]["text"] = "<p>Where precision craftsmanship meets tailored design.</p>"

          third = icons["group_8MHazd"]["blocks"]["group_VpdMnj"]["blocks"]
          third["text_fXwU8G"]["settings"]["text"] = "<h2>Premium Materials</h2>"
          third["text_rgBf9g"]["settings"]["text"] = "<p>Premium fabrics, solid wood, and lasting craftsmanship.</p>"

          fourth = icons["group_gUY8eF"]["blocks"]["group_cByaam"]["blocks"]
          fourth["text_LjXFVL"]["settings"]["text"] = "<h2>Free Designer Advice</h2>"
          fourth["text_Kjtmyz"]["settings"]["text"] = "<p>See your sofa in your space with our free design service.</p>"

          rich = sections["section_QfwA36"]
          eyebrow = rich["blocks"]["text_YAAHKN"]["settings"]
          eyebrow["text"] = "<p>CONTACT US</p>"
          eyebrow["width"] = "100%"
          eyebrow["alignment"] = "center"

          heading = rich["blocks"]["text_P4MqyW"]["settings"]
          heading["text"] = "<h2>Let’s Create Something Beautiful</h2>"
          heading["width"] = "100%"
          heading["alignment"] = "center"
          heading["font_size"] = "2.5rem"

          button = rich["blocks"]["button_JgJTK4"]["settings"]
          button["label"] = "GET IN TOUCH"
          button["link"] = "shopify://pages/contact"

          rich_settings = rich["settings"]
          rich_settings["horizontal_alignment"] = "center"
          rich_settings["horizontal_alignment_flex_direction_column"] = "center"
          rich_settings["gap"] = 24
          rich_settings["padding-block-start"] = 64
          rich_settings["padding-block-end"] = 64

          path.write_text(
              header + json.dumps(data, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

      - name: Commit homepage changes
        shell: bash
        run: |
          if git diff --quiet -- templates/index.json; then
            echo "No homepage changes were needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add templates/index.json
          git commit -m "content: update homepage service and contact copy"
          git push
